# NetWarden application tunables
# Loaded by src/lib/config.ts via hazo_core loadConfig

[netwarden]
# Session gap: idle period (minutes) before a new session is started
session_gap_minutes = 5
# Minimum floor for device active time (minutes) to count a session as active
min_active_floor_minutes = 1
# How often the device presence poller runs (seconds)
device_poll_seconds = 60
