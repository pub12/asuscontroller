# hazo_audit capture config. Default capture includes the app_ prefix.
# Map app_block_state's non-standard PK (device_id) to a device subject so
# outbox/field events attribute correctly. Other app_ tables are only audited
# if their writes go through a wrapWithAudit() adapter (blockService scopes the
# wrap to app_block_state writes only).
[overrides.app_block_state]
subject_kind = device
subject_id_column = device_id
