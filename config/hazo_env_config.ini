# hazo_env configuration for DarylWeb
# hazo-env doctor reads this file from config/hazo_env_config.ini
# hazo_env normalizes "development" → "dev" and "production" → "prod".
# Use canonical short names in section keys so doctor checks pass.

[env]
pattern = dev, test
app = darylweb

[data]
root = .

[db.dev]
type = sqlite
database_path = ./darylweb.sqlite

[db.test]
type = sqlite
database_path = ./darylweb_test.sqlite

[host.dev]
location = local

[host.test]
location = local

[files.local.dev]
base_path = ./data/dev/files

[files.local.test]
base_path = ./data/test/files
