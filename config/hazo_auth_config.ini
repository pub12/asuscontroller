# hazo_auth configuration for DarylWeb
# Copy this file pattern from node_modules/hazo_auth/config/hazo_auth_config.example.ini

[hazo_auth__cookies]
# IMPORTANT: also set HAZO_AUTH_COOKIE_PREFIX=darylweb_ in .env (Edge middleware reads env, not config)
cookie_prefix = darylweb_

[hazo_connect]
type = sqlite
sqlite_path = ./darylweb.sqlite

[hazo_auth__ui_shell]
layout_mode = standalone

[hazo_auth__oauth]
# Google-only sign-in. next-auth is installed and the stubs in next.config.js
# have been removed, so the "Continue with Google" button runs the real OAuth
# flow. Email/password login is disabled.
enable_google = true
enable_email_password = false
enable_facebook_oauth = false
# NextAuth sign-in page: point to app's login route
sign_in_page = /login
error_page = /login

[hazo_auth__user_management]
# Permissions shown in user management UI and available for role assignment
application_permission_list_defaults = darylweb:nw:superadmin,darylweb:nw:user

[hazo_auth__initial_setup]
# SUPERADMIN_EMAIL env var is used by scripts/seed.mjs directly for first-superadmin provisioning
# Uncomment and set below only if you want hazo_auth init-users to create the super user:
# default_super_user_email = admin@example.com

[hazo_auth__login_layout]
redirect_route_on_successful_login = /explore
